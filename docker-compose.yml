services:

  mongo:
    image: mongo:7.0
    container_name: inventory_mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # The healthcheck does double duty:
    # - initiates the replica set on first run
    # - only reports healthy once RS is confirmed up
    # This means the app never starts until RS is ready.
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            if (rs.status().ok) { quit(0); }
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
            quit(0);
          }
          quit(1);
        "
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: inventory_api
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: "mongodb://mongo:27017/?replicaSet=rs0"
      DATABASE_NAME: "inventory_db"
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  mongo_data: